version: "3.9"

# Kokomoor Platform — Docker Compose
# Run: docker compose up --build
# Individual pipeline: docker compose up job-agent

services:
  # --- Pipeline: Job Application Agent ---
  job-agent:
    build:
      context: .
      dockerfile: pipelines/job_agent/Dockerfile
    container_name: kp-job-agent
    env_file: .env
    volumes:
      - ./data:/app/data          # Persistent SQLite + generated files
      - ./pipelines/job_agent/prompts:/app/pipelines/job_agent/prompts:ro
      - ./pipelines/job_agent/context:/app/pipelines/job_agent/context:ro
    depends_on: []
    restart: unless-stopped

  # --- Prometheus (observability) ---
