# Example shape for candidate_profile.yaml — copy to candidate_profile.yaml and fill in.
# candidate_profile.yaml is gitignored and stays on your machine only.
# Schema version 1: bullets have stable IDs, tags, and optional length variants.

schema_version: 1

name: Your Name
location: City, ST
email: you@example.com
phone: "+1-555-0100"
linkedin: linkedin.com/in/your-profile
github: github.com/youruser
clearance: ""

education:
  - id: edu_school_a
    school: Example University
    degree: BS Example
    graduation: "20XX"
    gpa: ""
    location: City, ST
    bullets:
      - id: edu_a_1
        text: "Relevant coursework or honors"
        tags: [academic]

experience:
  - id: exp_company_a
    company: Example Corp
    title: Example Role
    dates: "20XX-Present"
    location: City, ST
    subtitle: "Optional company description"
    bullets:
      - id: comp_a_1
        text: "Impact bullet with metrics"
        tags: [leadership, technical]
        variants:
          short: "Short version of impact bullet"

skills:
  languages: [Python]
  frameworks: []
  domains: []
  tools: [Git]

cover_letter:
  preferred_tone: "Direct, confident, human. Professional but not stiff."
  preferred_signoff: "Sincerely,"
  positioning_angles:
    - "Bridge technical depth and product judgment."
  motivation_themes:
    - "Mission-driven technology with real-world operational impact."
  target_industries:
    - "Defense"
    - "AI/ML"
  emphasize_topics:
    - "Leading cross-functional technical teams"
    - "Building production-grade systems"
  de_emphasize_topics:
    - "Early academic projects"
  hard_constraints:
    - "No em dashes."
    - "No placeholders."
  style_preferences:
    - "Concrete, metric-backed examples."
    - "Natural business-letter flow."
    - "Vary sentence length."
  banned_phrases:
    - "I am excited to apply"
    - "team player"
    - "proven track record"
    - "hit the ground running"
    - "detail-oriented"
  narrative_themes:
    - "Hands-on builder who can also set direction."
